<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Admin — DineOS</title>
  <meta name="description" content="DineOS Restaurant Admin Panel — Manage your restaurant">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-container animate-fadeInUp">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-icon">🍽️</div>
        <div>
          <div class="brand-name">DineOS</div>
          <div class="brand-tagline">Restaurant Admin</div>
        </div>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to manage your restaurant</p>

      <div id="errorMsg" class="alert alert-error" style="display:none">
        <span class="alert-icon">⚠️</span>
        <span id="errorText"></span>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="apiKey">API Key <span class="required">*</span></label>
          <input type="text" id="apiKey" name="apiKey" placeholder="rk_live_xxxxxxxxxxxxxxxx" required autocomplete="off">
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Your restaurant API key — provided by DineOS super admin</div>
        </div>

        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="owner@yourrestaurant.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <div class="input-group">
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="input-toggle" id="togglePassword" title="Show/hide password">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
          <span id="loginBtnText">Sign In to Dashboard</span>
          <div class="spinner" id="loginSpinner" style="display:none"></div>
        </button>
      </form>

      <p class="auth-footer">Need help? Contact your DineOS super admin</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
